<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengguna - Gafexta News</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="profile-container">
        <header class="profile-header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1>Profil Saya</h1>
        </header>

        <main class="profile-card">
            <div class="profile-image">
                <i class="fas fa-user-circle"></i>
            </div>
            
            <div class="profile-info">
                <div class="info-group">
                    <label>Nama Lengkap</label>
                    <p>Mahasiswa IT Gafexta</p>
                </div>
                <div class="info-group">
                    <label>Email</label>
                    <p>mahasiswa@it.example.com</p>
                </div>
                <div class="info-group">
                    <label>Status Keanggotaan</label>
                    <span class="badge">Premium Reader</span>
                </div>
            </div>

            <div class="profile-actions">
                <button class="edit-btn">Edit Profil</button>
                <button class="logout-btn">Keluar</button>
            </div>
        </main>
    </div>

</body>
</html>
